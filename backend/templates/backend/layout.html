{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="{% static 'backend/css/bootstrap/bootstrap.min.css' %}" />
    <link rel="stylesheet" href="{% static 'backend/css/back.css' %}" />
    <link rel="stylesheet" href="{% static 'backend//layout/styles/fontawesome-free/css/fontawesome-all.min.css' %}" />
    {% block links %}{% endblock links %}
    <title>{% block title %}{% endblock title %} - Radon Backend</title>
</head>

<body>
    <aside>
        <div>
            <ul class="main-menu">
                <li><a href="#">Dashboard</a></li>
                <li><a href="#">Pages</a></li>
                <li><a href="#">Posts</a></li>
                <li><a href="{% url 'themes' %}">Themes</a></li>
                <li><a href="#">Settings</a></li>
            </ul>
        </div>
    </aside>

    {% block body %}{% endblock body %}
    <footer></footer>
    <script src="{% static 'backend/js/back.js' %}"></script>
</body>

</html>
